[package]
name = "deltachat-wasm"
version = "0.1.0"
edition = "2021"
license = "MPL-2.0"
description = "wasm-bindgen wrapper exposing chatmail core's JSON-RPC API (CommandApi) to the browser"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# patched core worktree (apply-patches.sh must have run)
deltachat = { path = "../../../build/core", default-features = false }
deltachat-jsonrpc = { path = "../../../build/core/deltachat-jsonrpc", default-features = false }
tokio = { package = "tokio-wasm-shim", path = "../../../crates/tokio-wasm-shim" }
yerpc = "0.6"
futures-lite = "2"
serde_json = "1"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
console_error_panic_hook = "0.1"
console_log = "1"
log = "0.4"

[patch.crates-io]
async-imap = { path = "../../../vendor-crates/async-imap" }
# vendored: routes SystemTime::now() through web-time on wasm32 (boundary + Date generation)
mail-builder = { path = "../../../vendor-crates/mail-builder" }
# vendored: routes tokio through the tokio-wasm-shim facade so tar works on wasm32
astral-tokio-tar = { path = "../../../vendor-crates/astral-tokio-tar" }

[profile.release]
opt-level = "s"
lto = true
