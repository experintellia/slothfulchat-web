<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, interactive-widget=resizes-content"
    />
    <link rel="icon" type="image/png" href="./images/icon-256.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#2c8a68" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" href="./images/icon-256.png" />
    <!--
      Copy of upstream target-browser main.html with CSP loosened for the
      wasm edition: 'wasm-unsafe-eval' (core wasm), worker-src 'self'
      (core worker + blobs service worker), connect-src ws:/wss: (WS-TCP
      proxy) + data:/blob: + http://*:*/unfurl and https://*:*/unfurl (the
      link-preview unfurl endpoint, on whatever bridge you point at — any
      host/port, matching ws:/wss: above, but pinned to the /unfurl PATH so
      the page can't fetch any other URL: a guardrail against accidentally
      reaching a CDN, and it rules out a lazy exfil bucket at some other path.
      `:*` is a wildcard port — needed as the local bridge is on :8641.)
      The raw.githubusercontent.com URL is pinned to the exact relay-directory
      JSON the onboarding relay picker fetches (patches/desktop/0042,
      chatmail-relays-mirror) — one non-bridge URL, nothing else on that host.
      connect-src is REWRITTEN at assemble/customize time
      (instance-config.patchCsp): the relay-directory pin follows
      SLOTHFUL_RELAY_DIRECTORY and the analytics origin follows
      SLOTHFUL_PLAUSIBLE_DOMAIN, so keep the values here in sync with the base
      list + default pin there.
      * style-src 'unsafe-inline' is needed for theming and the virtual list.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none';
                   manifest-src 'self';
                   style-src 'self' 'unsafe-inline';
                   font-src 'self';
                   script-src 'self' 'wasm-unsafe-eval';
                   worker-src 'self' blob: ;
                   child-src blob: ;
                   img-src 'self' data: blob: file: webxdc-icon: ;
                   media-src 'self' file: blob: ;
                   connect-src 'self' ws: wss: data: blob: http://*:*/unfurl https://*:*/unfurl https://raw.githubusercontent.com/experintellia/chatmail-relays-mirror/refs/heads/data/relays.json"
    />
    <link rel="stylesheet" href="./fonts/fonts.css" />
    <link rel="stylesheet" href="./main.css" />
    <link rel="stylesheet" href="./bundle.css" />
    <link rel="stylesheet" href="./fallback-theme.css" />
    <!-- main.css bundles window-scoped stylesheets whose bare body{} rules
         leak onto the app (display:flex, overflow-y:auto). The app is a fixed
         full-viewport layout: the root must never scroll, else the navbar
         pans away when the on-screen keyboard opens. -->
    <style>
      html,
      body {
        overflow: hidden;
      }
      body {
        display: block;
      }
    </style>
    <title>SlothfulChat</title>
    <style id="theme-vars"></style>
  </head>
  <body>
    <div id="root"></div>
    <!-- first: catches boot failures (e.g. bundle parse errors on old
         browsers) and shows an error screen instead of a blank page -->
    <script type="text/javascript" src="./boot-error.js"></script>
    <script type="text/javascript" src="./viewport-keyboard.js"></script>
    <script type="text/javascript" src="./avoid-eval.js"></script>
    <script
      type="text/javascript"
      src="./browser-source-map-support.js"
    ></script>
    <script type="text/javascript" src="./fix-missing-vars.js"></script>
    <!-- per-instance config (imprint, instance identity, default proxy) baked
         in by assemble.mjs from env vars; replaced there, empty by default -->
    <!--slothful-config-->
    <!-- OUR runtime.js (sets window.r); bundle.js is byte-identical upstream -->
    <script src="./runtime.js" type="module"></script>
    <script src="./bundle.js" type="module"></script>
    <div id="color-input-wrapper" aria-hidden="true">
      <input id="color-input" tabindex="-1" type="color" />
    </div>
  </body>
</html>
