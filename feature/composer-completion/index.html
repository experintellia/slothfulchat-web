<!doctype html>
<html><head><meta charset="utf-8"><style>
  :root{
    --bg:#100f13; --chat:#16151a; --composer:#242229; --composer-border:#34313b;
    --text:#e9e8ee; --muted:#8f8b99; --accent:#3a7afe; --hi:#3a3542;
    --menu:#1f1d24; --menu-border:#3a3644; --shadow:rgba(0,0,0,.55);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--text)}
  .app{max-width:780px;margin:0 auto;width:100%;height:100vh;display:flex;flex-direction:column;
       background:var(--chat);border-left:1px solid #000;border-right:1px solid #000}
  .header{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #000;background:#1b1a20}
  .avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#f0883e,#c14b7a);
          display:flex;align-items:center;justify-content:center;font-weight:600;color:#fff}
  .htitle{font-weight:600}.hsub{font-size:12px;color:var(--muted)}
  .messages{flex:1;padding:18px 16px;display:flex;flex-direction:column;gap:10px;justify-content:flex-end;overflow:hidden}
  .row{display:flex}.row.out{justify-content:flex-end}
  .bubble{max-width:70%;padding:8px 12px;border-radius:14px;font-size:14.5px;line-height:1.35}
  .in .bubble{background:#26242c;border-bottom-left-radius:4px}
  .out .bubble{background:#264a8a;border-bottom-right-radius:4px}
  .time{font-size:10.5px;color:var(--muted);margin-top:3px;text-align:right}
  .out .time{color:#a9c2f2}

  .composer-wrap{position:relative;padding:10px 12px 14px;border-top:1px solid #000;background:var(--chat)}
  .composer{display:flex;align-items:flex-end;gap:8px;background:var(--composer);
            border:1px solid var(--composer-border);border-radius:14px;padding:6px 8px}
  .cbtn{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;
        color:var(--muted);font-size:20px;flex:0 0 auto;user-select:none}
  .ta{flex:1;min-height:34px;max-height:120px;padding:7px 6px;font-size:15px;color:var(--text);
      line-height:1.3;background:transparent;border:0;outline:0;resize:none;font-family:inherit}
  .send{background:var(--accent);color:#fff}

  .cmenu{position:absolute;left:52px;bottom:64px;width:300px;background:var(--menu);
         border:1px solid var(--menu-border);border-radius:12px;box-shadow:0 12px 34px var(--shadow);
         overflow:hidden;font-size:14px}
  .cmenu-head{padding:7px 12px;font-size:11px;letter-spacing:.04em;text-transform:uppercase;
              color:var(--muted);border-bottom:1px solid var(--menu-border)}
  .cmenu-list{max-height:232px;overflow-y:auto}
  .cmenu-list::-webkit-scrollbar{width:9px}
  .cmenu-list::-webkit-scrollbar-thumb{background:#413d4c;border-radius:5px;border:2px solid var(--menu)}
  .cmenu-item{display:flex;align-items:center;gap:11px;padding:8px 12px;position:relative;cursor:default}
  .cmenu-em{font-size:20px;width:24px;text-align:center;flex:0 0 auto}
  .cmenu-code{color:var(--text)}
  .cmenu-item.active{background:var(--hi)}
  .cmenu-item.active::before{content:"";position:absolute;left:0;width:3px;height:34px;background:var(--accent);border-radius:0 3px 3px 0}
  .cmenu-foot{padding:6px 12px;font-size:11px;color:var(--muted);border-top:1px solid var(--menu-border);display:flex;gap:14px}
  kbd{background:#2c2934;border:1px solid #423e4d;border-radius:4px;padding:0 5px;font-size:10.5px;color:#cfccd6;margin-right:2px}
</style></head>
<body><div id="root"></div><script type="module" src="./bundle.js"></script></body></html>
