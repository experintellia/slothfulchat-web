# Build the standalone web app from a clean checkout and deploy
# packages/web-app/dist to GitHub Pages.
#
# The build order is load-bearing and NOT obvious — see the comments below.
# It was derived empirically (a full clean build was run end-to-end); do not
# reorder steps casually. The two ordering traps:
#   1. the @deltachat/jsonrpc-client `file:` dep must be generated + built
#      BEFORE the root `pnpm install` tries to resolve it.
#   2. `pnpm assemble` wipes and repopulates dist/, so `pnpm build` (which
#      emits runtime.js + blobs-sw.js INTO dist/) must run AFTER assemble.
#
# To enable: repo Settings -> Pages -> Source = "GitHub Actions".

name: Deploy web-app to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; never cancel an in-flight deploy.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules — vendor/core + vendor/deltachat-desktop)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # scripts/apply-patches.sh runs `git am` inside the submodules; git am
      # refuses to commit without an author identity.
      - name: Configure git identity (required by `git am` in apply-patches)
        run: |
          git config --global user.email "ci@github-actions"
          git config --global user.name "GitHub Actions"

      # sqlite-wasm-rs compiles SQLite's C sources with clang.
      # The runner's preinstalled third-party repos (packages.microsoft.com,
      # google-chrome) intermittently fail clearsign validation or serve a
      # mid-sync index, and ANY failing repo makes `apt-get update` exit 100 and
      # aborts the job. We don't use them, so drop them first; retry to ride out
      # transient hiccups on the base ubuntu archive too.
      - name: Install clang (sqlite-wasm-rs builds C)
        run: |
          sudo rm -f /etc/apt/sources.list.d/*microsoft* \
                     /etc/apt/sources.list.d/*azure* \
                     /etc/apt/sources.list.d/*google* \
                     /etc/apt/sources.list.d/*chrome*
          for i in 1 2 3; do sudo apt-get update && break || sleep $((i*5)); done
          sudo apt-get install -y clang

      - name: Install Rust stable + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      # Cache the cargo registry + all target/ dirs (root, build/core native
      # test build, and the wasm build). The native `cargo test` and the
      # ~10-min release wasm build dominate wall time, so this is the cache
      # that matters most.
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        env:
          # Save the cache even when the job fails — otherwise a broken deploy
          # rebuilds the ~10-min wasm step from scratch on every retry.
          CACHE_ON_FAILURE: true
        with:
          workspaces: |
            build/core
            packages/core-wasm/rust

      - name: Setup Node 22 + pnpm (corepack)
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable corepack (provides the pinned pnpm)
        run: corepack enable

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      # Recreate build/core + build/desktop worktrees from the pinned submodule
      # commits + patch stacks (build/core = patched core, build/desktop =
      # upstream desktop, 0 patches).
      - name: Apply patch stacks (creates build/core, build/desktop)
        run: pnpm apply-patches

      # ORDER TRAP #1: generate + build the @deltachat/jsonrpc-client TS client
      # from the patched core at its pinned commit. `cargo test` generates the
      # TS bindings; then constants, tsc, esbuild bundle. This is a `file:` dep
      # of core-wasm, so it MUST exist before the root `pnpm install` below.
      # (local pnpm-workspace.yaml: builds in isolation from the root workspace
      # AND carries allowBuilds — pnpm 11 hard-errors on esbuild's postinstall
      # otherwise; --ignore-workspace can't work here since it makes pnpm skip
      # the very file that holds the allowBuilds setting. esbuild's postinstall
      # is unwanted anyway, its JS launcher is what we bundle with.)
      - name: Generate + build @deltachat/jsonrpc-client (before root install)
        working-directory: build/core/deltachat-jsonrpc/typescript
        run: |
          printf 'allowBuilds:\n  esbuild: false\n' > pnpm-workspace.yaml
          pnpm install
          cargo test -p deltachat-jsonrpc
          node scripts/generate-constants.js
          ./node_modules/.bin/tsc
          ./node_modules/.bin/esbuild --format=esm --bundle dist/deltachat.js --outfile=dist/deltachat.bundle.js

      - name: Install workspace deps
        run: pnpm install

      # Upstream deltachat-desktop browser bundle (its own workspace/lockfile).
      # assemble.mjs copies its dist/ output. esbuild builds fine in-tree here.
      # VERSION_INFO_GIT_REF: upstream's build stamps a `git describe` into the
      # bundle, which fails here (worktree has no tags) — pass the sha instead.
      # NODE_ENV=production: release frontend (minified React, debug features
      # hidden) — only on the build, NOT on `pnpm install` (production install
      # would skip the devDependencies the build needs). Local builds stay dev.
      - name: Build upstream desktop browser frontend (release)
        working-directory: build/desktop
        run: |
          export VERSION_INFO_GIT_REF=$(git rev-parse --short HEAD)
          pnpm install --frozen-lockfile
          NODE_ENV=production pnpm build:browser

      # Release wasm (opt-level=s + LTO); dev builds crash the browser tab.
      # ~10 min uncached.
      - name: Build wasm core (release)
        run: pnpm --filter @slothfulchat/core-wasm build:wasm

      - name: Build core-wasm TS (worker + index)
        run: pnpm --filter @slothfulchat/core-wasm build

      # ORDER TRAP #2: assemble wipes+repopulates dist/ (upstream bundle,
      # locales, wasm worker, index.html, .nojekyll); build emits runtime.js +
      # blobs-sw.js INTO dist/. build MUST come after assemble.
      # Per-instance config baked in from repo Variables/Secrets (never in
      # source). Set these under Settings -> Secrets and variables -> Actions.
      # All optional: unset -> generic build with a placeholder imprint.
      - name: Assemble web-app dist/ (upstream bundle + wasm + overlays)
        run: pnpm --filter @slothfulchat/web-app assemble
        env:
          # release: bakes devmode:false into config.js (runtime rc_config)
          NODE_ENV: production
          SLOTHFUL_INSTANCE_NAME: ${{ vars.SLOTHFUL_INSTANCE_NAME }}
          SLOTHFUL_INSTANCE_URL: ${{ vars.SLOTHFUL_INSTANCE_URL }}
          SLOTHFUL_DEFAULT_PROXY: ${{ vars.SLOTHFUL_DEFAULT_PROXY }}
          SLOTHFUL_IMPRINT_NAME: ${{ vars.SLOTHFUL_IMPRINT_NAME }}
          SLOTHFUL_IMPRINT_ADDRESS: ${{ vars.SLOTHFUL_IMPRINT_ADDRESS }}
          SLOTHFUL_IMPRINT_EMAIL: ${{ vars.SLOTHFUL_IMPRINT_EMAIL }}
      - name: Build web-app runtime + service worker (into dist/)
        run: pnpm --filter @slothfulchat/web-app build

      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload dist/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/web-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
