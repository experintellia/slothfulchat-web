# GitHub Pages is the PROD deployment (web.slothful.chat) and deploys on
# release tags (v*), NOT on main. Main-branch deployments live on
# next.slothful.chat via deploy-next.yml.
#
# The github-pages environment needs a `v*` tag deployment rule (repo Settings
# -> Environments -> github-pages -> "Deployment branches and tags") or tag
# deploys are rejected with "not allowed to deploy due to environment
# protection rules". Tag-push runs use the workflow file AT the tag's commit,
# so this trigger applies to tags created after it merges; workflow_dispatch
# stays as a manual fallback.
#
# The build sequence lives in .github/actions/build-web-app (shared with the
# preview + next deploys); its step order is load-bearing — see that file.
#
# To enable: repo Settings -> Pages -> Source = "GitHub Actions".

name: Deploy web-app to GitHub Pages

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; never cancel an in-flight deploy.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Per-instance config baked into config.js by the composite action's
    # assemble step, which inherits these as process env. Set them under
    # Settings -> Secrets and variables -> Actions. All optional: unset ->
    # generic build with a placeholder imprint.
    env:
      SLOTHFUL_INSTANCE_NAME: ${{ vars.SLOTHFUL_INSTANCE_NAME }}
      SLOTHFUL_INSTANCE_URL: ${{ vars.SLOTHFUL_INSTANCE_URL }}
      SLOTHFUL_DEFAULT_PROXY: ${{ vars.SLOTHFUL_DEFAULT_PROXY }}
      SLOTHFUL_PUBLIC_BRIDGES: ${{ vars.SLOTHFUL_PUBLIC_BRIDGES }}
      SLOTHFUL_DEFAULT_CHATMAIL: ${{ vars.SLOTHFUL_DEFAULT_CHATMAIL }}
      SLOTHFUL_IMPRINT_NAME: ${{ vars.SLOTHFUL_IMPRINT_NAME }}
      SLOTHFUL_IMPRINT_ADDRESS: ${{ vars.SLOTHFUL_IMPRINT_ADDRESS }}
      SLOTHFUL_IMPRINT_EMAIL: ${{ vars.SLOTHFUL_IMPRINT_EMAIL }}
      # anonymous usage stats: unset -> no analytics (see instance-config.mjs)
      SLOTHFUL_PLAUSIBLE_DOMAIN: ${{ vars.SLOTHFUL_PLAUSIBLE_DOMAIN }}
      SLOTHFUL_PLAUSIBLE_API: ${{ vars.SLOTHFUL_PLAUSIBLE_API }}
    steps:
      - name: Checkout (with submodules — vendor/core + vendor/deltachat-desktop)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build web-app dist/
        uses: ./.github/actions/build-web-app

      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload dist/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/web-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
