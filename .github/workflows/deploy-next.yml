# next.slothful.chat = the current main branch, deployed to the flagship Caddy
# server. This replaces the old Pages-on-main deployment (Pages is now prod, on
# v* tags only — see deploy-pages.yml). Same build + gate-script upload path as
# the PR previews, into the server's permanent `next/` slot.
#
# Variable-gated on PREVIEW_SSH_HOST so it no-ops until the server exists.
# See infra/flagship/README.md for bring-up.

name: Deploy web-app to next

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# One deploy at a time; never cancel an in-flight deploy.
concurrency:
  group: deploy-next
  cancel-in-progress: false

jobs:
  deploy:
    if: vars.PREVIEW_SSH_HOST != ''
    runs-on: ubuntu-latest
    # Same SLOTHFUL_* branding as prod (deploy-pages.yml), minus the
    # SLOTHFUL_PLAUSIBLE_* pair: analytics track prod only — next builds
    # without them so its traffic never pollutes prod stats (issue #134
    # tracks dedicated Plausible sites for next/staging, if ever wanted).
    # Inherited as process env by the composite assemble step.
    env:
      SLOTHFUL_INSTANCE_NAME: ${{ vars.SLOTHFUL_INSTANCE_NAME }}
      SLOTHFUL_INSTANCE_URL: ${{ vars.SLOTHFUL_INSTANCE_URL }}
      SLOTHFUL_DEFAULT_PROXY: ${{ vars.SLOTHFUL_DEFAULT_PROXY }}
      SLOTHFUL_PUBLIC_BRIDGES: ${{ vars.SLOTHFUL_PUBLIC_BRIDGES }}
      SLOTHFUL_DEFAULT_CHATMAIL: ${{ vars.SLOTHFUL_DEFAULT_CHATMAIL }}
      SLOTHFUL_IMPRINT_NAME: ${{ vars.SLOTHFUL_IMPRINT_NAME }}
      SLOTHFUL_IMPRINT_ADDRESS: ${{ vars.SLOTHFUL_IMPRINT_ADDRESS }}
      SLOTHFUL_IMPRINT_EMAIL: ${{ vars.SLOTHFUL_IMPRINT_EMAIL }}
    steps:
      - name: Checkout (with submodules — vendor/core + vendor/deltachat-desktop)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build web-app dist/
        uses: ./.github/actions/build-web-app

      # Stream dist/ to the server; the deploy key's forced command runs the
      # gate script (`upload next`), which stages, validates the full merged
      # config and reloads on success. A non-zero exit fails the job.
      - name: Deploy dist/ to next.slothful.chat
        env:
          SSH_KEY: ${{ secrets.PREVIEW_SSH_KEY }}
          SSH_HOSTKEY: ${{ vars.PREVIEW_SSH_HOSTKEY }}
          SSH_HOST: ${{ vars.PREVIEW_SSH_HOST }}
        run: |
          set -euo pipefail
          key=$(mktemp); kh=$(mktemp)
          printf '%s\n' "$SSH_KEY" > "$key"; chmod 600 "$key"
          printf '%s\n' "$SSH_HOSTKEY" > "$kh"
          tar -C packages/web-app -czf - dist \
            | ssh -i "$key" -o IdentitiesOnly=yes -o UserKnownHostsFile="$kh" \
                deploy@"$SSH_HOST" "upload next"
