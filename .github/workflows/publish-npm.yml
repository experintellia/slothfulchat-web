# On tag push: create the GitHub release (prebuilt web-app zip + the
# standalone customize script) and publish @slothfulchat/ws-tcp-proxy,
# @slothfulchat/core-wasm and @slothfulchat/customize to npm. Auth is npm
# Trusted Publishing (OIDC, id-token: write) — no token secret; each package's
# npmjs.com Settings -> Trusted Publisher must point at this repo + this
# workflow FILENAME (so never rename publish-npm.yml).
#
# Versioning: one shared `v*` tag triggers the run; each package is published
# only if its package.json version isn't on the registry yet. So: bump the
# version(s) you want to release, commit, tag, push the tag. Re-running is
# idempotent (release assets are re-uploaded with --clobber).
#
# The release zip is a GENERIC build: no SLOTHFUL_* vars, placeholder imprint.
# Self-hosters bake their values in with the customize script — see
# SELFHOSTING.md — so the zip works for everyone without rebuilding.
#
# The core-wasm build steps mirror deploy-pages.yml — same order traps apply
# (jsonrpc-client must be generated before the root pnpm install).

name: Publish packages to npm

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  id-token: write # npm trusted publishing + provenance
  contents: write # gh release create/upload

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules — vendor/core + vendor/deltachat-desktop)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure git identity (required by `git am` in apply-patches)
        run: |
          git config --global user.email "ci@github-actions"
          git config --global user.name "GitHub Actions"

      # drop the runner's flaky preinstalled MS repos (see deploy-pages.yml)
      - name: Install clang (sqlite-wasm-rs builds C)
        run: |
          sudo rm -f /etc/apt/sources.list.d/*microsoft* /etc/apt/sources.list.d/*azure*
          sudo apt-get update && sudo apt-get install -y clang

      - name: Install Rust stable + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        env:
          CACHE_ON_FAILURE: true
        with:
          workspaces: |
            build/core
            packages/core-wasm/rust

      # NO registry-url here: it makes setup-node write an .npmrc with a
      # placeholder NODE_AUTH_TOKEN, which npm then uses INSTEAD of the OIDC
      # trusted-publishing exchange (unauthenticated PUT -> 404).
      - name: Setup Node 22 + pnpm (corepack)
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable corepack (provides the pinned pnpm)
        run: corepack enable

      # Trusted publishing needs npm >= 11.5.1; Node 22 ships 10.x. No sudo:
      # sudo's PATH hits the system npm, leaving the toolcache npm (the one
      # this job actually runs) old — publish then dies with ENEEDAUTH.
      # Pinned to major 11, NOT @latest: npm 12.0.0 (2026-07-08) crashes on
      # provenance publish ("Cannot find module 'sigstore'" from
      # libnpmpublish/provenance.js — broke the v0.3.0 run). Re-evaluate the
      # pin once a fixed npm 12.x is out.
      - name: Update npm (trusted publishing support)
        run: npm install -g npm@11 && npm --version

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Apply patch stacks (creates build/core, build/desktop)
        run: pnpm apply-patches

      # ORDER TRAP: the workspace override points @deltachat/jsonrpc-client at
      # this file: path, so it must be generated + built before `pnpm install`.
      - name: Generate + build @deltachat/jsonrpc-client (before root install)
        working-directory: build/core/deltachat-jsonrpc/typescript
        run: |
          printf 'allowBuilds:\n  esbuild: false\n' > pnpm-workspace.yaml
          pnpm install
          cargo test -p deltachat-jsonrpc
          node scripts/generate-constants.js
          ./node_modules/.bin/tsc
          ./node_modules/.bin/esbuild --format=esm --bundle dist/deltachat.js --outfile=dist/deltachat.bundle.js

      - name: Install workspace deps
        run: pnpm install

      - name: Build wasm core (release)
        run: pnpm --filter @slothfulchat/core-wasm build:wasm

      - name: Build core-wasm TS (worker + index)
        run: pnpm --filter @slothfulchat/core-wasm build

      # bundled single-file CLI: published to npm below AND attached to the
      # GitHub release so self-hosters can run it without npm
      - name: Build customize CLI bundle
        run: pnpm --filter @slothfulchat/customize build

      # ---- GitHub release: prebuilt web-app zip + customize script ----
      # (tag pushes only; a plain workflow_dispatch just re-publishes npm)

      # mirrors deploy-pages.yml — see the comments there for the env quirks
      - name: Build upstream desktop browser frontend (release)
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: build/desktop
        run: |
          export VERSION_INFO_GIT_REF=$(git rev-parse --short HEAD)
          pnpm install --frozen-lockfile
          NODE_ENV=production pnpm build:browser

      # ORDER TRAP #2 (see deploy-pages.yml): build must come after assemble.
      # Deliberately NO SLOTHFUL_* vars — the zip stays generic (see header).
      - name: Assemble + build web-app dist/ (generic release build)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          NODE_ENV: production
        run: |
          pnpm --filter @slothfulchat/web-app assemble
          pnpm --filter @slothfulchat/web-app build

      # release first, npm publish after: a publish hiccup (e.g. a package's
      # trusted publisher not configured yet) must not block the release
      - name: Create GitHub release (web-app zip + customize script)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          (cd packages/web-app/dist && zip -qr "$GITHUB_WORKSPACE/slothfulchat-web-$GITHUB_REF_NAME.zip" .)
          cp packages/customize/dist/cli.mjs slothfulchat-customize.mjs
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
          gh release upload "$GITHUB_REF_NAME" --clobber "slothfulchat-web-$GITHUB_REF_NAME.zip" slothfulchat-customize.mjs

      - name: Publish packages whose version is new
        run: |
          for dir in packages/ws-tcp-proxy packages/core-wasm packages/customize; do
            name=$(node -p "require('./$dir/package.json').name")
            version=$(node -p "require('./$dir/package.json').version")
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "$name@$version already on the registry — skipping"
            else
              echo "publishing $name@$version"
              (cd "$dir" && npm publish --access public)
            fi
          done
