# CI: run the project's tests on pull requests (and pushes to main).
#
# Two jobs:
#   lint   — fast, no submodules, no wasm build: syntax-checks every .mjs and
#            type/compile-checks the standalone Rust shim crate. Gives quick
#            feedback on obvious breakage in seconds.
#   test   — the real test suite. Builds the whole app exactly like
#            deploy-pages.yml (patched core + upstream desktop bundle + release
#            wasm), then runs the headless Playwright smoke suites plus the
#            bridge-picker and chat-export E2E suites on top of it.
#
# The build half of `test` is a faithful copy of deploy-pages.yml — the same
# three ordering traps apply (jsonrpc-client generated before the root install;
# assemble before build; rust-cache after apply-patches). Keep the two in sync
# when either changes.

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs for the same ref (a new push to a PR obsoletes the old).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---- fast checks: no submodules, no wasm, no network ----
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (no submodules — nothing here needs them)
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # `pnpm install` can't run here (the jsonrpc-client file: dep doesn't
      # exist until apply-patches), but `node --check` needs no deps — it just
      # parses. Catches syntax errors in the scripts + package sources.
      - name: Syntax-check all .mjs sources
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r f; do
            node --check "$f" || { echo "SYNTAX FAIL: $f"; fail=1; }
          done < <(find scripts packages -name '*.mjs' \
                     -not -path '*/node_modules/*' -not -path '*/dist/*')
          exit $fail

      # dependency-free node:test suite for the pure config templating
      - name: Unit-test instance-config (parsePublicBridges etc.)
        run: node --test packages/web-app/instance-config.test.mjs

      # packages/calls engine/ (docs/calls.md M0): dependency-free too — Node's
      # built-in type-stripping test runner needs no pnpm install, only
      # "erasable" TS syntax (see packages/calls/tsconfig.base.json).
      - name: Unit-test packages/calls engine (interop serializer, ICE gathering)
        run: node --test packages/calls/engine/*.test.ts

      # Enforces docs/calls.md's "engine/ imports NO React/DOM": no react
      # import, no .tsx file, no reaching into ../ui or ../bridge.
      - name: Check packages/calls engine/ import boundary
        run: node scripts/check-calls-engine-boundary.mjs

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/tokio-wasm-shim

      # The shim crate has no submodule deps and builds natively in seconds
      # (native target just re-exports real tokio). clippy catches regressions
      # in the native code paths; the wasm paths are exercised by the full
      # build in `smoke`.
      - name: Check + clippy the tokio-wasm-shim crate (native)
        working-directory: crates/tokio-wasm-shim
        run: |
          cargo check --all-targets
          cargo clippy --all-targets

  # ---- real test suite: full build + headless smoke/E2E tests ----
  # Mirrors deploy-pages.yml's build; see that file for the detailed rationale
  # behind each step (apt/microsoft-repo removal, order traps, env quirks).
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout (with submodules — vendor/core + vendor/deltachat-desktop)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure git identity (required by `git am` in apply-patches)
        run: |
          git config --global user.email "ci@github-actions"
          git config --global user.name "GitHub Actions"

      - name: Install clang (sqlite-wasm-rs builds C)
        run: |
          # Drop preinstalled third-party apt repos (microsoft/azure/google-chrome):
          # unused here, and a mid-sync one makes `apt-get update` exit 100 (any
          # failing repo fails the whole update) and kills the job. We only need
          # clang from the base ubuntu archive. Retry to ride out transient hiccups.
          sudo rm -f /etc/apt/sources.list.d/*microsoft* \
                     /etc/apt/sources.list.d/*azure* \
                     /etc/apt/sources.list.d/*google* \
                     /etc/apt/sources.list.d/*chrome*
          for i in 1 2 3; do sudo apt-get update && break || sleep $((i*5)); done
          sudo apt-get install -y clang

      - name: Install Rust stable + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup Node 22 + pnpm (corepack)
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable corepack (provides the pinned pnpm)
        run: corepack enable

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Apply patch stacks (creates build/core, build/desktop)
        run: pnpm apply-patches

      # ORDER TRAP #3: this MUST run after apply-patches. rust-cache hashes the
      # workspaces' Cargo.lock files at restore time — build/core only exists
      # once apply-patches has created it, so running earlier computes a key
      # blind to the core dependency graph. Worse, apply-patches recreates
      # build/core with `rm -rf`, which would wipe a restored build/core/target.
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        env:
          CACHE_ON_FAILURE: true
        with:
          workspaces: |
            build/core
            packages/core-wasm/rust

      # ORDER TRAP #1 (see deploy-pages.yml): the workspace override points
      # @deltachat/jsonrpc-client at this file: path, so it must be generated +
      # built before the root `pnpm install` can resolve it.
      - name: Generate + build @deltachat/jsonrpc-client (before root install)
        working-directory: build/core/deltachat-jsonrpc/typescript
        run: |
          printf 'allowBuilds:\n  esbuild: false\n' > pnpm-workspace.yaml
          pnpm install
          cargo test -p deltachat-jsonrpc
          node scripts/generate-constants.js
          ./node_modules/.bin/tsc
          ./node_modules/.bin/esbuild --format=esm --bundle dist/deltachat.js --outfile=dist/deltachat.bundle.js

      - name: Install workspace deps
        run: pnpm install

      # packages/calls (docs/calls.md M0): per-subfolder typecheck now that
      # real @types/node / @types/react / react are installed — engine/'s
      # narrower tsconfig (no "jsx", see engine/tsconfig.json) is what actually
      # enforces the type-level half of the React/DOM import boundary.
      - name: Typecheck packages/calls (engine/ui/bridge)
        run: pnpm --filter @slothfulchat/calls build

      # Playwright chromium for the headless smoke suites (--with-deps pulls the
      # runner's shared libs). Uses the pinned playwright from the lockfile.
      # Browser downloads are cached; `playwright install` skips the download
      # when the pinned browser build is already in ~/.cache/ms-playwright.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: playwright-${{ runner.os }}-
      - name: Install Playwright chromium
        run: pnpm exec playwright install --with-deps chromium

      # Upstream desktop browser bundle — assemble.mjs copies its dist/ into the
      # web-app. See deploy-pages.yml for the VERSION_INFO_GIT_REF / NODE_ENV
      # notes. Dev build here (no NODE_ENV=production) is fine for smoke.
      - name: Build upstream desktop browser frontend
        working-directory: build/desktop
        run: |
          export VERSION_INFO_GIT_REF=$(git rev-parse --short HEAD)
          pnpm install --frozen-lockfile
          pnpm build:browser

      # --no-opt skips wasm-pack's wasm-opt post-pass (~5.5 min of the step;
      # longer than the Rust compile itself). Safe here: the suites are purely
      # functional, and the cargo release profile (opt-level=s + LTO) is kept —
      # only binaryen's extra size/speed pass is dropped. deploy-pages.yml
      # still runs the fully optimized build:wasm for production.
      - name: Build wasm core (release, no wasm-opt)
        run: pnpm --filter @slothfulchat/core-wasm build:wasm:ci

      - name: Build core-wasm TS (worker + index)
        run: pnpm --filter @slothfulchat/core-wasm build

      # core-wasm smoke: serves the example page, asserts get_system_info +
      # typed client + fs side channel answer from inside the browser.
      - name: Smoke test — core-wasm boots in the browser
        run: pnpm --filter @slothfulchat/core-wasm test

      # account ids/fingerprints e2e (issue #75): accounts.toml write-through
      # survives reload with ids/fingerprints/selection intact and no self-heal.
      - name: E2E test — account ids survive reload (issue #75)
        run: node scripts/test-account-ids-e2e.mjs

      # account churn e2e (post-#75 sahpool-leak incident): ~32 add+remove
      # cycles must not leak sahpool pool slots, brick boot with SQLITE_CANTOPEN,
      # or trip the self-heal on a valid accounts.toml.
      - name: E2E test — account churn does not leak sahpool slots
        run: node scripts/test-account-churn-e2e.mjs

      # ORDER TRAP #2 (see deploy-pages.yml): assemble wipes+repopulates dist/,
      # build emits runtime.js + blobs-sw.js into it — build must come after.
      - name: Assemble web-app dist/ (upstream bundle + wasm + overlays)
        run: pnpm --filter @slothfulchat/web-app assemble
      - name: Build web-app runtime + service worker (into dist/)
        run: pnpm --filter @slothfulchat/web-app build

      # web-app smoke: boots the proxy + static server, asserts the frontend
      # renders on the wasm core and keeps its proxy config across an
      # SW-controlled reload.
      - name: Smoke test — frontend boots on the wasm core
        run: pnpm --filter @slothfulchat/web-app test

      # bridge picker e2e (no proxy, no core boot): option list from an
      # injected instance config, preselection, localStorage save semantics
      - name: E2E test — bridge picker dialog
        run: node scripts/test-bridge-dialog.mjs

      # relay picker e2e (offline: the directory fetch and the bridge /dns +
      # /tcp probes are both mocked): the instant-onboarding relay dropdown
      # lists the directory relays default-first, lazily probes reachability +
      # latency once opened, offers an "Other…" host field, and the consent
      # link follows the selection.
      - name: E2E test — relay picker dropdown
        run: node scripts/test-relay-picker.mjs

      # chat export e2e (fully offline, mock madmail): drives the three-dot
      # "Export Chat" flow, unpacks the zip, renders the extracted index.html
      # viewer over file:// and exercises the "Save single-file HTML" button.
      - name: E2E test — chat export to zip
        run: node scripts/test-export-chat-html.mjs

      # unfurl service self-check (fully offline): metadata + inline image,
      # SSRF guards (private-IP / literal-IP refusal), size cap, rate limit.
      - name: Self-check — unfurl service
        run: node scripts/test-unfurl.mjs

      # link-preview e2e (fully offline: mock madmail + a local OpenGraph
      # server on *.localhost + the unfurl service): type URL → ghost → Add →
      # baked PNG card attaches → send; layout toggle, remove, dismiss, and
      # the CORS-blocked→unfurl fallback path.
      - name: E2E test — link-preview ghost UI
        run: node scripts/test-link-preview-e2e.mjs
